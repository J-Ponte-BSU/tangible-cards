<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tangible Cards</title>
    <style>
        :root {
            font-size: 200%;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: #19191e;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            gap: 10vh;
            padding: 5vh 0;
            font-family: sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        #row {
            display: flex;
            flex-direction: row;
            width: 100%;
            gap: 2rem;
            justify-content: center;
        }

        .card {
            width: 28vw;
            aspect-ratio: 2;

            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 1rem 0;

            background-color: black;
            color: white;
            box-shadow: 0 0 24px 0 #00000082;
            text-align: center;
        }

        span {
            display: block;
        }

        .big {
            font-size: 2.5rem;
            min-height: 2em;
        }

        .small {
            font-weight: bold;
        }

        .fresh {
            .big {
                display: none;
            }

            .small {
                font-size: 2.5rem;
            }
        }

        #sensor {
            background-color: #22C55E;
        }

        #actuator {
            background-color: #F43F5E;
        }

        #emotion {
            background-color: #3B82F6;
        }

        #shuffle {
            all: unset;
            position: relative;
            background-color: white;
            padding: .4rem;
            width: 500px;
            text-align: center;
            border-radius: 8px;
            font-size: 1.5rem;
            bottom: 0px;
            transition: bottom .2s;
        }

        #shuffle-wrap:hover #shuffle {
            bottom: 10px;
        }
    </style>
</head>

<body class="fresh">
    <div class="dud"></div>
    <div id="row">
        <div id="sensor" class="card"><span class="big">???</span><span class="small">sensor</span></div>
        <div id="actuator" class="card"><span class="big">???</span><span class="small">actuator</span></div>
        <div id="emotion" class="card"><span class="big">???</span><span class="small">emotion</span></div>
    </div>
    <div id="shuffle-wrap">
        <button id="shuffle">shuffle</button>
    </div>
</body>
<script>
    const sensors = [
        "Buttons",
        "Switches",
        "Photoresistor",
        "Potentiometer",
        "Ping sensor",
        "Temperature sensor",
        "Humidity sensor",
        "Accelerometer",
        "Infrared remote",
        "Heartrate monitor",
        "Touch sensor",
    ];

    const actuators = [
        "LEDs",
        "LED strip",
        "LED ring",
        "Servo motor",
        "DC motor",
        "Stepper motor",
        "Buzzer",
        "LCD display",
        "WiFi",
        "Motors",
    ];

    const emotions = [
        "Sadness", "Anger", "Fear", "Joy", "Love", "Surprise",
        "Suffering", "Sad", "Disappointed", "Shameful", "Neglected", "Despair",
        "Enraged", "Exasperated", "Irritable", "Jealous", "Disgust",
        "Scared", "Insecure", "Terror", "Nervous", "Horror",
        "Cheerful", "Content", "Proud", "Optimistic", "Enthusiastic", "Excited",
        "Affectionate", "Longing", "Desire", "Tenderness", "Peaceful",
        "Moved", "Overcome", "Confused", "Perplexed", "Astonished", "Shocked",
        "Depressed", "Sick", "Lonely", "Bored", "Ashamed", "Guilty", "Powerless", "Vulnerable",
        "Grief", "Isolated", "Dismayed", "Appalled", "Disapproval",
        "Hostile", "Hate", "Outraged", "Mad", "Frustrated", "Aggressive", "Bitter", "Resentful",
        "Violated", "Repulsed",
        "Frightened", "Helpless", "Panicked", "Hysterical", "Inadequate", "Inferior", "Worthless",
        "Worried", "Anxious",
        "Happy", "Playful", "Blissful", "Amused", "Delighted", "Triumphant",
        "Illustrious", "Eager", "Zeal", "Jubilant", "Warm", "Loving",
        "Caring", "Compassionate", "Infatuation", "Passionate", "Attracted", "Sentimental",
        "Fondness", "Romantic", "Admiration",
        "Amazed", "Awe-struck", "Speechless", "Startled", "Troubled", "Agitated"
    ]

    const sensor = document.getElementById("sensor");
    const actuator = document.getElementById("actuator");
    const emotion = document.getElementById("emotion");

    sensor.style.transform = `rotate(${10 - 20 * Math.random()}deg)`
    actuator.style.transform = `rotate(${10 - 20 * Math.random()}deg)`
    emotion.style.transform = `rotate(${10 - 20 * Math.random()}deg)`

    function shuffle(e, list) {
        e.querySelector(".big").innerText = list[Math.floor(Math.random() * list.length)]
        e.style.transform = `rotate(${10 - 20 * Math.random()}deg)`
    }

    function shuffleAll() {
        document.body.classList.remove("fresh")
        shuffle(sensor, sensors)
        shuffle(actuator, actuators)
        shuffle(emotion, emotions)
    }

    document.getElementById("shuffle").addEventListener("click", shuffleAll)
    document.body.addEventListener("keydown", e => { if (e.code == "Space") shuffleAll(); else console.log(e); })
</script>

</html>
